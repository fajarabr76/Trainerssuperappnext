version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 15 (App Router)
  - Tailwind CSS
  - Supabase
  - Recharts
  - Docx
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Welcome page
  - path: /qa-analyzer/dashboard
    file: app/(main)/qa-analyzer/dashboard/page.tsx
    auth_required: true
    description: QA Analyzer Executive Summary Dashboard
  - path: /qa-analyzer/reports
    file: app/(main)/qa-analyzer/reports/page.tsx
    auth_required: true
    description: Report Maker for generating Word reports with AI
features:
  - name: Report Maker
    description: Create automated QA evaluation reports in .docx format with AI narration and chart captures.
    files:
      - app/(main)/qa-analyzer/reports/ReportMakerClient.tsx
      - app/(main)/qa-analyzer/reports/actions/report-actions.ts
      - app/(main)/qa-analyzer/reports/lib/docx-builder.ts
    entry_route: /qa-analyzer/reports
    user_interactions:
      - Select report type (Service or Individual)
      - Select service type and date range
      - Select AI model (Gemini or OpenRouter)
      - Click "Generate report" button
      - Click "Unduh .docx" button
    api_calls:
      - method: POST
        endpoint: /api/qa-analyzer/reports/generate (via Server Action)
    auth_required: true
  - name: QA Dashboard
    description: Visualize QA findings with Pareto and Donut charts.
    files:
      - app/(main)/qa-analyzer/dashboard/page.tsx
    entry_route: /qa-analyzer/dashboard
    user_interactions:
      - Select date range
      - Select team filter
    api_calls:
      - method: GET
        endpoint: /api/qa-analyzer/data (via Server Action)
    auth_required: true
known_limitations: []
